# CAR-bench Track 2 final submission scenario — "rosebud" fixed-fast arm.
#
# Evaluator image is the official organizer-published image and is not modified.
# The agent image must be replaced with the digest-pinned GHCR reference before
# submission (tag-only references are not accepted).
#
# No secret VALUES appear in this file; only env var NAMES with ${VAR:?} /
# ${VAR:-default} indirection.

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"

[evaluator.env]
GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY (Gemini API key for the fixed user simulator and policy judge)}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[agent_under_test]
image = "ghcr.io/ab-shetty/rosebud-car-bench-agent@sha256:REPLACE_WITH_DIGEST"

[agent_under_test.env]
# --- Inference credentials and routing (all configurable) ---
CEREBRAS_API_KEY = "${CEREBRAS_API_KEY:?Set CEREBRAS_API_KEY (Cerebras Cloud API key for the gpt-oss agent model)}"
TRACK2_EXECUTOR_MODEL = "${TRACK2_EXECUTOR_MODEL:-gpt-oss-120b}"
TRACK2_CEREBRAS_API_BASE = "${TRACK2_CEREBRAS_API_BASE:-}"
TRACK2_CEREBRAS_SERVICE_TIER = "${TRACK2_CEREBRAS_SERVICE_TIER:-}"
TRACK2_EXECUTOR_REASONING_EFFORT = "${TRACK2_EXECUTOR_REASONING_EFFORT:-medium}"
TRACK2_MAX_COMPLETION_TOKENS = "${TRACK2_MAX_COMPLETION_TOKENS:-1024}"
TRACK2_TEMPERATURE = "${TRACK2_TEMPERATURE:-}"
TRACK2_LLM_MALFORMED_RETRIES = "${TRACK2_LLM_MALFORMED_RETRIES:-1}"

# --- Harness selection (REQUIRED: without this the agent runs the stock baseline) ---
TRACK2_HARNESS = "${TRACK2_HARNESS:-adaptive_minimal}"
TRACK2_TRANSPORT = "${TRACK2_TRANSPORT:-chat}"

# --- Submitted arm: deterministic guard stack + consensus + prefetch ---
TRACK2_AM_PREFETCH = "${TRACK2_AM_PREFETCH:-true}"
TRACK2_AM_PREFETCH_SEMANTIC = "${TRACK2_AM_PREFETCH_SEMANTIC:-true}"
TRACK2_AM_ARGUMENT_BINDING_GUARD = "${TRACK2_AM_ARGUMENT_BINDING_GUARD:-true}"
TRACK2_AM_DISCLOSURE_GUARD = "${TRACK2_AM_DISCLOSURE_GUARD:-true}"
TRACK2_AM_TRUNCATION_RESCUE = "${TRACK2_AM_TRUNCATION_RESCUE:-true}"
TRACK2_AM_PLACEHOLDER_GUARD = "${TRACK2_AM_PLACEHOLDER_GUARD:-true}"
TRACK2_AM_VAGUE_DEGREE_CLARIFY = "${TRACK2_AM_VAGUE_DEGREE_CLARIFY:-true}"
TRACK2_AM_SCHEMA_PREFLIGHT = "${TRACK2_AM_SCHEMA_PREFLIGHT:-true}"
TRACK2_AM_VALUE_PROVENANCE = "${TRACK2_AM_VALUE_PROVENANCE:-true}"
TRACK2_AM_TIME_FORMAT_REVISE = "${TRACK2_AM_TIME_FORMAT_REVISE:-true}"
TRACK2_AM_ASK_BUDGET = "${TRACK2_AM_ASK_BUDGET:-true}"
TRACK2_AM_REPEATED_READ_BREAKER = "${TRACK2_AM_REPEATED_READ_BREAKER:-true}"
TRACK2_AM_ROUTE_REFERENCE_PREFLIGHT = "${TRACK2_AM_ROUTE_REFERENCE_PREFLIGHT:-true}"
TRACK2_AM_POLICY_LINT = "${TRACK2_AM_POLICY_LINT:-true}"
TRACK2_AM_RESCUE_QUALITY = "${TRACK2_AM_RESCUE_QUALITY:-true}"
TRACK2_AM_INITIAL_CAP_4096 = "${TRACK2_AM_INITIAL_CAP_4096:-true}"
TRACK2_AM_MUTATION_CONSENSUS = "${TRACK2_AM_MUTATION_CONSENSUS:-true}"
TRACK2_AM_ROUTE_RESOLVER = "${TRACK2_AM_ROUTE_RESOLVER:-true}"
TRACK2_AM_ASK_TYPE_GATE = "${TRACK2_AM_ASK_TYPE_GATE:-true}"
TRACK2_AM_TEXTCALL_GUARD = "${TRACK2_AM_TEXTCALL_GUARD:-true}"
TRACK2_AM_ARG_LINT = "${TRACK2_AM_ARG_LINT:-true}"

# --- Rate-limit behavior (Cerebras 429 handling) ---
TRACK2_CEREBRAS_QUEUE_BACKOFF_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_SECONDS:-60}"
TRACK2_CEREBRAS_QUEUE_BACKOFF_INITIAL_JITTER_RATIO = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_INITIAL_JITTER_RATIO:-0.1}"
TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MIN_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MIN_SECONDS:-90}"
TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MAX_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_SECOND_MAX_SECONDS:-120}"
TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MIN_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MIN_SECONDS:-180}"
TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MAX_SECONDS = "${TRACK2_CEREBRAS_QUEUE_BACKOFF_CAP_MAX_SECONDS:-300}"
TRACK2_CEREBRAS_RATE_LIMIT_RETRY_BUFFER_SECONDS = "${TRACK2_CEREBRAS_RATE_LIMIT_RETRY_BUFFER_SECONDS:-1}"
CAR_BENCH_CEREBRAS_RATE_LIMIT_REPORT_DIR = "${CAR_BENCH_CEREBRAS_RATE_LIMIT_REPORT_DIR:-/tmp/car-bench-rate-limit-reports}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[config]
num_trials = 3
task_split = "hidden"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
